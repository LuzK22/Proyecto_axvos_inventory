<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 58">
  <defs>
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c8e8"/>
      <stop offset="55%" stop-color="#0094b8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="hexBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ecfea"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>
  <!-- Outer border glow -->
  <polygon points="25,1 49,14 49,44 25,57 1,44 1,14"
           fill="none" stroke="url(#hexBorder)" stroke-width="2" opacity="0.6"/>
  <!-- Main fill -->
  <polygon points="25,3.5 46.5,15.5 46.5,42.5 25,54.5 3.5,42.5 3.5,15.5"
           fill="url(#hexFill)"/>
  <!-- Inner edge highlight -->
  <polygon points="25,6 44,17 44,41 25,52 6,41 6,17"
           fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.25"/>
  <!-- AX text -->
  <text x="25" y="36"
        text-anchor="middle"
        font-family="Segoe UI, Arial Black, sans-serif"
        font-size="19"
        font-weight="900"
        fill="white"
        letter-spacing="1"
        style="paint-order:stroke"
        stroke="#0d1b2a"
        stroke-width="0.5">AX</text>
</svg>
